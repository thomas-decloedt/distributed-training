services:
  train:
    build:
      context: .
      dockerfile: Dockerfile.train.cpu
    volumes:
      - ./data:/app/projects/train/data
      - ./checkpoints:/app/projects/train/checkpoints
    command: ["--nproc_per_node=4", "-m", "mnist.train"]

  train-lora:
    build:
      context: .
      dockerfile: Dockerfile.train.cpu
    volumes:
      - ./data:/app/projects/train/data
      - ./checkpoints:/app/projects/train/checkpoints
    command: ["--nproc_per_node=4", "-m", "lora.train"]

  train-gpu:
    profiles:
      - gpu
    build:
      context: .
      dockerfile: Dockerfile.train.gpu
    volumes:
      - ./data:/app/projects/train/data
      - ./checkpoints:/app/projects/train/checkpoints
    command: ["--nproc_per_node=1", "-m", "lora.train"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
